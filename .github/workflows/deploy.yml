name: Deploy to citruscodex.fr

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 62.210.237.49
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          source: "index.html,manifest.json,sw.js,favicon.ico,icon-192.png,icon-512.png,icon-180.png,logo.png,404.html,assets"
          target: /var/www/cca/
