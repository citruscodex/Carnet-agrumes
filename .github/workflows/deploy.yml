name: Deploy to citruscodex.fr

on:
  push:
    branches: [ main, refactor/repo-migration ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Prepare deploy (structure plate pour scp)
        run: |
          # index.html : fixe la référence manifest (hashée → chemin stable)
          node .github/fix-manifest.js
          # Assets Vite (logos + bundle JS, hachés)
          # Vider d'abord si existant pour éviter assets/assets/
          rm -rf assets
          cp -r build/assets assets
          # Fichiers statiques non bundlés par Vite
          cp public/sw.js    sw.js
          cp public/404.html 404.html
          cp public/manifest.json manifest.json
          # Vérification
          echo "--- Fichiers à déployer ---"
          ls -la index.html manifest.json sw.js 404.html
          ls assets/ | head -5

      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # Écrire la clé SSH dans un fichier temporaire
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"
          HOST=root@62.210.237.49
          TARGET=/var/www/cca

          # Vérifier que le répertoire cible existe (sinon le créer)
          $SSH $HOST "mkdir -p $TARGET/assets"

          # Copier les fichiers un par un (évite les problèmes de tar côté serveur)
          $SCP index.html     $HOST:$TARGET/index.html
          $SCP manifest.json  $HOST:$TARGET/manifest.json
          $SCP sw.js          $HOST:$TARGET/sw.js
          $SCP 404.html       $HOST:$TARGET/404.html
          $SCP -r assets/     $HOST:$TARGET/assets/

          echo "✅ Déploiement terminé"
          $SSH $HOST "ls -la $TARGET/ | head -10"

          # Nettoyage
          rm /tmp/deploy_key
