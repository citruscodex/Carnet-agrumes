name: Deploy to citruscodex.fr

on:
  push:
    branches: [ main, refactor/repo-migration ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Prepare deploy (structure plate pour scp)
        run: |
          # index.html : fixe la référence manifest (hashée → chemin stable)
          node .github/fix-manifest.js
          # Assets Vite (logos + bundle JS, hachés)
          # Vider d'abord si existant pour éviter assets/assets/
          rm -rf assets
          cp -r build/assets assets
          # Fichiers statiques non bundlés par Vite
          cp public/sw.js    sw.js
          cp public/404.html 404.html
          cp public/manifest.json manifest.json
          cp public/training.html training.html
          cp public/aide.html aide.html
          cp public/cgu.html cgu.html
          cp public/confidentialite.html confidentialite.html
          cp public/mentions-legales.html mentions-legales.html
          cp public/changelog.html changelog.html
          # Vérification
          echo "--- Fichiers à déployer ---"
          ls -la index.html manifest.json sw.js 404.html cgu.html confidentialite.html mentions-legales.html
          ls assets/ | head -5

      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no"
          HOST=root@62.210.237.49
          TARGET=/var/www/cca

          # Créer l'archive localement (scp de fichier unique fonctionne)
          tar -czf /tmp/deploy.tar.gz index.html manifest.json sw.js 404.html training.html aide.html cgu.html confidentialite.html mentions-legales.html changelog.html assets
          echo "Archive créée : $(du -sh /tmp/deploy.tar.gz)"

          # Copier l'archive sur le serveur
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              /tmp/deploy.tar.gz $HOST:/tmp/deploy.tar.gz

          # Extraire sur le serveur et vérifier
          $SSH $HOST "
            set -e
            mkdir -p $TARGET
            tar -xzf /tmp/deploy.tar.gz -C $TARGET/
            rm /tmp/deploy.tar.gz
            echo '✅ Extraction OK'
            ls -la $TARGET/ | head -12
          "

          rm /tmp/deploy_key /tmp/deploy.tar.gz
