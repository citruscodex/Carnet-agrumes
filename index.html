<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet Agrumes - Collectionneur</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .hidden { display: none; }
        button { margin: 5px; padding: 8px; }
    </style>
</head>
<body>
    <h1>Carnet Agrumes</h1>
    <div id="auth-container">
        <h2>Connexion / Inscription</h2>
        <input type="email" id="email" placeholder="Email" /><br>
        <input type="password" id="password" placeholder="Mot de passe" /><br>
        <button onclick="signup()">S'inscrire</button>
        <button onclick="login()">Se connecter</button>
    </div>
    <div id="app-container" class="hidden">
        <h2>Bienvenue, <span id="user-email"></span> !</h2>
        <p>Profil : <span id="user-profil"></span></p>
        <div id="collectionneur-features">
            <h3>Fonctionnalités Collectionneur</h3>
            <p>Gérez vos agrumes ici.</p>
        </div>
        <div id="pepinieriste-features" class="hidden">
            <h3>Fonctionnalités Pépiniériste (désactivé)</h3>
            <p>Cette section sera activée plus tard.</p>
        </div>
        <button onclick="logout()">Se déconnecter</button>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function signup() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                await db.collection("users").doc(user.uid).set({
                    email: email,
                    profil: "collectionneur",
                    abonnement: "gratuit"
                });
                alert("Compte créé avec succès !");
                updateUI(user);
            } catch (error) {
                alert("Erreur : " + error.message);
            }
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                updateUI(userCredential.user);
            } catch (error) {
                alert("Erreur : " + error.message);
            }
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById("auth-container").classList.remove("hidden");
                document.getElementById("app-container").classList.add("hidden");
            });
        }

        async function updateUI(user) {
            if (user) {
                document.getElementById("auth-container").classList.add("hidden");
                document.getElementById("app-container").classList.remove("hidden");
                document.getElementById("user-email").textContent = user.email;
                const userDoc = await db.collection("users").doc(user.uid).get();
                const profil = userDoc.data().profil;
                document.getElementById("user-profil").textContent = profil;
                if (profil === "collectionneur") {
                    document.getElementById("pepinieriste-features").classList.add("hidden");
                } else {
                    document.getElementById("pepinieriste-features").classList.remove("hidden");
                }
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) { updateUI(user); }
            else {
                document.getElementById("auth-container").classList.remove("hidden");
                document.getElementById("app-container").classList.add("hidden");
            }
        });
    </script>
</body>
</html>
